name: Windows Test
on:
  push:
    branches:
      - main


permissions:
  contents: read


jobs:
  win64:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-2022]

    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"

      - name: build wheel
        uses: pypa/cibuildwheel@v3.4.1
        with:
          package-dir: pygomx
        env:
          CIBW_SKIP: "*-win32 *t-*"
          PYGOMX_BUILD_MODE: shared
          CIBW_REPAIR_WHEEL_COMMAND_WINDOWS: "delvewheel repair --add-path ${GITHUB_WORKSPACE}\\pygomx -w {dest_dir} {wheel}"
